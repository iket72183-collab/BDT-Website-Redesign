name: Deploy

# Fires after CI passes on a push to main. Triggers Railway redeploy for the
# API + worker services. Vercel auto-deploys via its native GitHub integration
# — no action needed here for the admin app.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-api:
    name: Railway · API + worker
    # Only run if CI passed AND the trigger was a push to main (not a PR).
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install via npm rather than the upstream `curl | sh` installer. That
      # script uses bash-only syntax and breaks under Ubuntu's /bin/sh (dash)
      # with "Bad substitution", and it drops the binary in ~/.railway/bin
      # which isn't on PATH. The npm package puts `railway` straight on PATH.
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Triggers a redeploy of the API service. The project has only one
      # deployable service ("worker" is a storage bucket, not a service). The
      # Railway project is detected via RAILWAY_TOKEN (project-scoped); the
      # service runs the build/start commands from railway.toml.
      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --detach
