  /* Luxury scroll reveal: soft blur, lift, and a preview state for upcoming sections. */
  .fade-section {

    transform: translateY(24px) scale(0.99);
    filter: blur(6px);
    transition:

      filter 0.68s cubic-bezier(0.22, 1, 0.36, 1);

  .fade-section.visible {

      transform: translateY(0) scale(1);

  }
  .stagger-item {

    filter: blur(4px);

  }
  .fade-section.visible .stagger-item {

// ── TOKENS ──────────────────────────────────────
const T = {
  gold: '#C9A84C', goldLight: '#F1D78F', goldWarm: '#F5E9BF',
  purple: '#4B0082', purpleMid: '#6a1fa8', purpleLight: '#c99dff',
  crimson: '#8B0000', crimsonLight: '#ff8888',

  glowCrimson: '0 0 18px rgba(176,16,32,.55), 0 0 48px rgba(139,0,0,.22)',

// ── SHARED COMPONENTS ────────────────────────────
function Kicker({ children, color }) {
  return <div style={{ fontFamily: "'DM Sans', Arial, sans-serif", fontSize: '0.66rem', letterSpacing: '0.32em', textTransform: 'uppercase', color: color || T.gold, marginBottom: 6 }}>{children}</div>;
}

function SectionTitle({ children }) {
  return <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(1.6rem,2.8vw,2.5rem)', fontWeight: 500, color: T.white, lineHeight: 1.15 }}>{children}</h2>;
}

function SectionCopy({ children }) {
  return <p style={{ fontSize: '0.96rem', lineHeight: 1.85, color: 'rgba(255,255,255,0.6)', maxWidth: 640, marginTop: 10 }}>{children}</p>;
}

function GoldDivider({ compact = false }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: compact ? 8 : 10, margin: compact ? '20px 0' : '28px 0' }}>
      <div style={{ flex: 1, height: 1, background: 'linear-gradient(90deg, transparent, rgba(201,168,76,0.4))' }} />

      <div style={{ flex: 1, height: 1, background: 'linear-gradient(270deg, transparent, rgba(201,168,76,0.4))' }} />
    </div>

}

function Btn({ children, variant = 'primary', onClick, type = 'button' }) {
  const [hov, setHov] = useState(false);
  const base = { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', borderRadius: 999, fontFamily: "'DM Sans', Arial, sans-serif", fontSize: '0.72rem', fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', padding: '12px 22px', cursor: 'pointer', border: '1px solid', transition: 'transform .2s, box-shadow .2s' };
  const primary = { background: 'linear-gradient(160deg,rgba(201,168,76,.18),rgba(201,168,76,.07))', borderColor: hov ? T.gold : 'rgba(201,168,76,.38)', color: T.goldWarm, transform: hov ? 'translateY(-2px)' : 'none', boxShadow: hov ? T.glowGold : 'none' };
  const secondary = { background: 'rgba(255,255,255,.04)', borderColor: hov ? 'rgba(201,168,76,.4)' : 'rgba(255,255,255,.1)', color: T.silver, transform: hov ? 'translateY(-2px)' : 'none' };
  return <button type={type} style={{ ...base, ...(variant === 'primary' ? primary : secondary) }} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} onClick={onClick}>{children}</button>;
}

function Badge({ children, color }) {
  return <div style={{ display: 'inline-flex', alignItems: 'center', minHeight: 34, padding: '0 13px', border: `1px solid ${color || 'rgba(201,168,76,0.28)'}`, borderRadius: 999, background: 'rgba(201,168,76,0.07)', fontFamily: "'DM Sans'", fontSize: '0.66rem', letterSpacing: '0.16em', textTransform: 'uppercase', color: color || T.goldWarm }}>{children}</div>;
}

function SocialPill({ label, abbr, href, fullWidth }) {
  const [hov, setHov] = useState(false);
  return (
    <a href={href || '#'} target="_blank" rel="noopener noreferrer" aria-label={`Visit BDT Talent Group on ${label}`}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display: 'inline-flex', alignItems: 'center', justifyContent: fullWidth ? 'center' : 'flex-start', flex: fullWidth ? '1 1 160px' : undefined, gap: 7, padding: '8px 13px', border: `1px solid ${hov ? 'rgba(201,168,76,.7)' : 'rgba(201,168,76,.22)'}`, borderRadius: 999, background: hov ? 'rgba(201,168,76,.06)' : 'rgba(255,255,255,.03)', color: hov ? T.goldWarm : T.silver, fontSize: '0.7rem', letterSpacing: '0.14em', textTransform: 'uppercase', textDecoration: 'none', boxShadow: hov ? T.glowGold : 'none', transition: 'all .2s' }}>
      <span style={{ width: 18, height: 18, borderRadius: 999, border: '1px solid rgba(201,168,76,.32)', background: 'rgba(201,168,76,.08)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.52rem', fontWeight: 700, color: T.goldLight, flexShrink: 0 }}>{abbr}</span>
      {label}
    </a>
  );
}

// ── HERO SCREEN ───────────────────────────────────
function HeroScreen({ isMobile }) {
  return (
    <section className="stagger-item" style={{ '--stagger-index': 0, minHeight: isMobile ? 'auto' : '100vh', display: 'grid', alignContent: 'center', textAlign: 'center', gap: 0, padding: isMobile ? '10px 4px 0' : '40px 24px' }}>

        AI-Powered Talent.<br />
        <span style={{ color: T.goldLight, fontStyle: 'italic', textShadow: T.glowGold }}>Human-Centered Culture.</span>

      <div style={{ marginTop: isMobile ? 10 : 14, fontSize: isMobile ? '0.94rem' : '0.9rem', letterSpacing: isMobile ? '0.01em' : '0.08em', textTransform: 'none', color: T.silver, opacity: 0.72, lineHeight: 1.55, maxWidth: 560, marginInline: 'auto' }}>
        Elevating the next generation of creators. The industry's watching. 🚀
      </div>
      <GoldDivider compact={isMobile} />
      <div style={{ display: 'flex', justifyContent: 'center', marginTop: isMobile ? -6 : -10, marginBottom: isMobile ? 10 : 14 }}>
        <Kicker>Social Media Links</Kicker>

      <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: isMobile ? 8 : 9 }}>

      </div>

  );
}

// ── ABOUT SCREEN ─────────────────────────────────
function AboutScreen({ isMobile }) {
  return (
    <div className="stagger-item" style={{ '--stagger-index': 1, padding: isMobile ? '28px 20px' : '40px 32px', border: '1px solid rgba(201,168,76,0.16)', borderRadius: 26, background: 'rgba(255,255,255,0.025)', backdropFilter: 'blur(4px)', boxShadow: '0 24px 70px rgba(0,0,0,0.5)' }}>

        <div style={{ display: 'grid', gap: isMobile ? 10 : 12 }}>
          <Kicker>Isaac Tran · BDT Talent Group</Kicker>
          <SectionCopy>Isaac Tran is the founder of BDT Talent Group and believes the future of human creativity isn't threatened by artificial intelligence, it's elevated by it. His vision: empower artists, creators, and culture-makers with AI as a tool, not a replacement.</SectionCopy>

      </div>

// ── RIVERDALE CREW ────────────────────────────────
function AgentCard({ name, role, desc, colorScheme, staggerIndex, isMobile }) {
  const [hov, setHov] = useState(false);
  const schemes = {
    gold:    { border: `rgba(201,168,76,${hov ? 0.42 : 0.28})`, glow: hov ? T.glowGold : 'none', radial: 'rgba(201,168,76,0.1)', roleColor: T.gold, dotBg: T.gold, dotGlow: T.gold },
    purple:  { border: `rgba(107,31,168,${hov ? 0.48 : 0.32})`, glow: hov ? T.glowPurple : 'none', radial: 'rgba(107,31,168,0.1)', roleColor: '#c99dff', dotBg: '#c99dff', dotGlow: '#9b59b6' },
    crimson: { border: `rgba(176,16,32,${hov ? 0.45 : 0.3})`, glow: hov ? T.glowCrimson : 'none', radial: 'rgba(176,16,32,0.1)', roleColor: '#ff8888', dotBg: '#ff8888', dotGlow: '#c0392b' },

  return (
    <div className="stagger-item" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ '--stagger-index': staggerIndex, position: 'relative', overflow: 'hidden', borderRadius: 20, padding: isMobile ? '22px 18px' : '26px 20px', border: `1px solid ${s.border}`, background: '#0a0a0c', display: 'flex', flexDirection: 'column', gap: isMobile ? 10 : 12, transform: hov ? 'translateY(-8px)' : 'none', boxShadow: s.glow, transition: 'transform .35s ease, box-shadow .35s ease', cursor: 'default' }}>

        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: isMobile ? '1.16rem' : '1.25rem', fontWeight: 500, color: T.white }}>{name}</div>
        <div style={{ fontFamily: "'DM Sans'", fontSize: '0.62rem', letterSpacing: '0.26em', textTransform: 'uppercase', color: s.roleColor, marginTop: 3 }}>{role}</div>

      <div style={{ fontSize: isMobile ? '0.82rem' : '0.86rem', lineHeight: isMobile ? 1.65 : 1.75, color: 'rgba(255,255,255,0.68)', position: 'relative', zIndex: 1 }}>{desc}</div>

        <span style={{ fontSize: '0.6rem', letterSpacing: '0.2em', textTransform: 'uppercase', color: s.roleColor }}>Online</span>
      </div>
    </div>
  );
}

function CrewScreen({ isMobile }) {
  return (
    <div className="stagger-item" style={{ '--stagger-index': 0, padding: isMobile ? '28px 20px' : '36px 32px', border: '1px solid rgba(201,168,76,0.14)', borderRadius: 26, background: 'rgba(255,255,255,0.025)', boxShadow: '0 24px 70px rgba(0,0,0,0.5)' }}>

function ServiceCard({ num, name, desc, staggerIndex, isMobile }) {

      style={{ '--stagger-index': staggerIndex, padding: isMobile ? '18px 16px' : '22px 18px', borderRadius: 16, border: `1px solid ${hov ? 'rgba(201,168,76,0.35)' : 'rgba(201,168,76,0.1)'}`, background: hov ? 'rgba(201,168,76,0.04)' : 'rgba(255,255,255,0.02)', transform: hov ? 'translateY(-4px)' : 'none', transition: 'all .25s', display: 'grid', gap: isMobile ? 7 : 9 }}>

      {imageSrc ? <img src={imageSrc} alt={`${name} app icon`} style={{ width: isMobile ? 56 : 64, height: isMobile ? 56 : 64, borderRadius: 16, objectFit: 'cover', border: '1px solid rgba(201,168,76,0.18)', boxShadow: '0 10px 28px rgba(0,0,0,0.35)' }} /> : null}
      {platform ? <div style={{ fontSize: isMobile ? '0.58rem' : '0.62rem', letterSpacing: '0.28em', textTransform: 'uppercase', color: isPurple ? '#c99dff' : T.gold }}>{platform}</div> : null}
      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: isMobile ? '1.28rem' : '1.45rem', fontWeight: 500, color: T.white }}>{name}</div>
      <div style={{ fontSize: isMobile ? '0.83rem' : '0.87rem', lineHeight: isMobile ? 1.65 : 1.75, color: 'rgba(255,255,255,0.68)' }}>{desc}</div>
      {badge ? <div style={{ display: 'inline-flex', alignItems: 'center', gap: 7, padding: '8px 14px', width: 'fit-content', border: `1px solid ${isPurple ? 'rgba(107,31,168,0.3)' : 'rgba(201,168,76,0.22)'}`, borderRadius: 999, background: isPurple ? 'rgba(107,31,168,0.08)' : 'rgba(201,168,76,0.06)', fontSize: '0.62rem', letterSpacing: '0.18em', textTransform: 'uppercase', color: isPurple ? '#c99dff' : T.goldWarm }}>◆ {badge}</div> : null}

      <Kicker>Mobile · Google Play · Apple App Store</Kicker>

// ── CONTACT ───────────────────────────────────────
function ContactScreen({ isMobile }) {
  const [form, setForm] = useState({ fullName: '', email: '', message: '', _gotcha: '' });
  const [status, setStatus] = useState('idle');
  const updateField = (field) => (event) => {
    setForm((current) => ({ ...current, [field]: event.target.value }));
  };

  const handleSubmit = async (event) => {
    event.preventDefault();
    if (!form.fullName || !form.email || !form.message) return;
    setStatus('sending');

    try {
      const response = await fetch('https://formspree.io/f/mojykkbw', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Accept: 'application/json',
        },
        body: JSON.stringify({
          fullName: form.fullName,
          email: form.email,
          message: form.message,
          _gotcha: form._gotcha,
          source: 'bdttalentgroup.com contact form',
        }),
      });

      if (!response.ok) {
        throw new Error('Formspree submission failed');
      }

      setStatus('sent');
      setForm({ fullName: '', email: '', message: '', _gotcha: '' });
    } catch (error) {
      setStatus('error');
    }
  };

  const clearForm = () => {
    setForm({ fullName: '', email: '', message: '', _gotcha: '' });
    setStatus('idle');
  };

  return (
    <div className="stagger-item" style={{ '--stagger-index': 0, position: 'relative', overflow: 'hidden', border: '1px solid rgba(201,168,76,0.18)', borderRadius: 26, padding: isMobile ? '28px 20px' : '36px 32px', background: 'rgba(255,255,255,0.02)', boxShadow: '0 24px 80px rgba(0,0,0,0.5)' }}>
      <div style={{ position: 'absolute', top: -80, left: -80, width: 300, height: 300, background: 'radial-gradient(circle, rgba(75,0,130,0.1) 0%, transparent 70%)', pointerEvents: 'none' }} />
      <div style={{ position: 'absolute', bottom: -60, right: -60, width: 260, height: 260, background: 'radial-gradient(circle, rgba(139,0,0,0.1) 0%, transparent 70%)', pointerEvents: 'none' }} />
      <div style={{ position: 'relative', zIndex: 1 }}>
        <Kicker>Contact</Kicker>
        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(1.4rem,2.5vw,2.1rem)', fontWeight: 500, color: T.white, marginTop: 8 }}>How to Reach Us</div>
        <p style={{ fontSize: '0.93rem', lineHeight: 1.8, color: 'rgba(255,255,255,0.68)', marginTop: 10, marginBottom: 22 }}>Share your project, talent inquiry, or brand opportunity and it will route directly to BDT management.</p>
        <form style={{ display: 'grid', gap: 14 }} onSubmit={handleSubmit}>
          <div style={{ position: 'absolute', left: '-9999px', width: 1, height: 1, overflow: 'hidden' }} aria-hidden="true">
            <label htmlFor="contact-company-name">Company Name</label>
            <input
              id="contact-company-name"
              type="text"
              name="_gotcha"
              tabIndex="-1"
              autoComplete="off"
              value={form._gotcha}
              onChange={updateField('_gotcha')}
            />
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 14 }}>
            <ContactField label="Full Name" placeholder="Your full name" type="text" value={form.fullName} onChange={updateField('fullName')} required />
            <ContactField label="Email Address" placeholder="name@example.com" type="email" value={form.email} onChange={updateField('email')} required />
          </div>
          <ContactField label="Message" placeholder="Tell us about your inquiry." value={form.message} onChange={updateField('message')} textarea required />
          {status === 'error' ? (
            <p style={{ fontSize: '0.82rem', color: '#ff9a9a', lineHeight: 1.7 }}>
              Something went wrong while sending your message. Please try again in a moment.
            </p>
          ) : null}
          {status === 'sent' ? (
            <div style={{ display: 'grid', gap: 8, padding: '16px 18px', borderRadius: 16, border: '1px solid rgba(201,168,76,0.28)', background: 'linear-gradient(160deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04))', boxShadow: '0 0 24px rgba(201,168,76,0.08)', color: T.goldWarm }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: '0.82rem', letterSpacing: '0.18em', textTransform: 'uppercase' }}>
                <span style={{ width: 24, height: 24, borderRadius: 999, border: '1px solid rgba(201,168,76,0.42)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(201,168,76,0.1)' }}>✓</span>
                Message Sent
              </div>
              <div style={{ fontSize: '0.85rem', lineHeight: 1.75, color: 'rgba(255,255,255,0.78)' }}>
                Your message was sent successfully. BDT management will receive it through the new contact form.
              </div>
            </div>
          ) : null}
          <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', gap: 12 }}>
            <Btn variant="primary" type="submit">{status === 'sending' ? 'Sending...' : 'Send Message'}</Btn>
            <Btn variant="secondary" onClick={clearForm}>Clear Form</Btn>
          </div>
        </form>
      </div>
    </div>
  );
}

function ContactField({ label, placeholder, type, textarea, value, onChange, required }) {
  const [focus, setFocus] = useState(false);
  const fieldId = `contact-${label.toLowerCase().replace(/\s+/g, '-')}`;
  const inputStyle = { width: '100%', background: 'rgba(255,255,255,0.03)', border: `1px solid ${focus ? 'rgba(201,168,76,0.6)' : 'rgba(201,168,76,0.18)'}`, borderRadius: 13, color: '#F0EEF5', fontFamily: "'DM Sans'", fontSize: '0.93rem', padding: '12px 15px', outline: 'none', boxShadow: focus ? '0 0 0 3px rgba(201,168,76,0.07)' : 'none', transition: 'border-color .2s, box-shadow .2s', resize: textarea ? 'vertical' : undefined, minHeight: textarea ? 120 : undefined };
  return (
    <div style={{ display: 'grid', gap: 7 }}>
      <label htmlFor={fieldId} style={{ fontSize: '0.64rem', letterSpacing: '0.2em', textTransform: 'uppercase', color: 'rgba(201,168,76,0.8)' }}>{label}</label>
      {textarea
        ? <textarea id={fieldId} style={inputStyle} placeholder={placeholder} value={value} onChange={onChange} required={required} onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} />
        : <input id={fieldId} type={type} style={inputStyle} placeholder={placeholder} value={value} onChange={onChange} required={required} onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} />
      }
    </div>
  );
}

// ── APP ───────────────────────────────────────────
function SectionBlock({ id, children, isMobile }) {
  return (
    <section id={id} className="fade-section" style={{ scrollMarginTop: 32, display: 'grid', gap: isMobile ? 22 : 28 }}>
      {children}
    </section>
  );
}

function App() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 960);
  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth <= 960);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  useEffect(() => {
    const sections = Array.from(document.querySelectorAll('.fade-section'));
    if (!sections.length) return undefined;

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      sections.forEach((section) => section.classList.add('visible'));
      return undefined;
    }

    // Intersection Observer handles the reveal state with no scroll listeners.
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          const section = entry.target;

          if (entry.intersectionRatio >= 0.16) {
            section.classList.add('visible');
            section.classList.remove('is-peeking');
            return;
          }

          if (entry.isIntersecting) {
            section.classList.add('is-peeking');
            section.classList.remove('visible');
            return;
          }

          if (entry.boundingClientRect.top < 0) {
            section.classList.add('visible');
          } else {
            section.classList.remove('visible');
          }
          section.classList.remove('is-peeking');
        });
      },
      {
        threshold: [0, 0.06, 0.16, 0.32],
        rootMargin: '0px 0px 12% 0px',
      }
    );

    sections.forEach((section) => observer.observe(section));
    return () => observer.disconnect();
  }, []);

  return (
    <>
      <style>{`@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.85)} }`}</style>
      <div style={{ minHeight: '100vh', position: 'relative', zIndex: 1 }}>
        <main style={{ padding: isMobile ? '22px 18px 48px' : '32px clamp(18px,3vw,48px) 72px' }}>
          <div style={{ maxWidth: 1020, margin: '0 auto', display: 'grid', gap: isMobile ? 24 : 32 }}>
            <SectionBlock id="about-me" isMobile={isMobile}>
              <HeroScreen isMobile={isMobile} />
              <AboutScreen isMobile={isMobile} />
            </SectionBlock>
            <SectionBlock id="riverdale-crew" isMobile={isMobile}>
              <CrewScreen isMobile={isMobile} />
            </SectionBlock>
            <SectionBlock id="what-we-do" isMobile={isMobile}>
              <WhatWeDoScreen isMobile={isMobile} />
            </SectionBlock>
            <SectionBlock id="products" isMobile={isMobile}>
              <ProductsScreen isMobile={isMobile} />
            </SectionBlock>
            <SectionBlock id="contact-me" isMobile={isMobile}>
              <ContactScreen isMobile={isMobile} />
            </SectionBlock>
          </div>
        </main>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
